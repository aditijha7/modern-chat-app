<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8" />

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    />

    <title>Login</title>

    <link
        rel="stylesheet"
        href="./css/style.css"
    />

</head>

<body>

    <div class="blob blob1"></div>
    <div class="blob blob2"></div>

    <div class="auth-container">

        <!-- LEFT SIDE -->

        <div class="auth-left">

            <h1>
                Connect & Chat
                <span class="gradient-text">
                    In Real-Time
                </span>
            </h1>

        </div>

        <!-- RIGHT SIDE -->

        <div class="auth-right">

            <div class="glass-card">

                <h2>Welcome Back 👋</h2>

                <!-- LOGIN FORM START -->

                <form id="loginForm">

                    <div class="input-group">

                        <input
                            type="email"
                            id="loginEmail"
                            placeholder="Email"
                            required
                        >

                    </div>

                    <div class="input-group">

                        <input
                            type="password"
                            id="loginPassword"
                            placeholder="Password"
                            required
                        >

                    </div>

                    <div class="options">

                        <label>

                            <input type="checkbox">

                            Remember Me

                        </label>

                        <a href="#">
                            Forgot Password?
                        </a>

                    </div>

                    <button
                        type="submit"
                        class="btn"
                    >
                        Login
                    </button>

                </form>

                <!-- LOGIN FORM END -->

                <div class="social-buttons">

                    <button class="social-btn">
                        Google
                    </button>

                    <button class="social-btn">
                        GitHub
                    </button>

                </div>

            </div>

        </div>

    </div>

    <!-- CONNECT JAVASCRIPT -->

    <script src="./js/script.js"></script>

</body>
</html>
