<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    />

    <title>Register</title>

    <link
        rel="stylesheet"
        href="./css/style.css"
    />
</head>

<body>

    <div class="blob blob1"></div>
    <div class="blob blob2"></div>

    <div class="auth-container">

        <div class="auth-left">

            <h1>
                Create Your
                <span class="gradient-text">
                    Modern Workspace
                </span>
            </h1>

        </div>

        <div class="auth-right">

            <div class="glass-card">

                <h2>Create Account ✨</h2>

                <!-- REGISTER FORM START -->
                <form id="registerForm">

                    <div class="input-group">

                        <input
                            type="text"
                            id="username"
                            placeholder="Username"
                            required
                        >

                    </div>

                    <div class="input-group">

                        <input
                            type="email"
                            id="email"
                            placeholder="Email"
                            required
                        >

                    </div>

                    <div class="input-group">

                        <input
                            type="password"
                            id="password"
                            placeholder="Password"
                            required
                        >

                    </div>

                    <div class="input-group">

                        <input
                            type="password"
                            id="confirmPassword"
                            placeholder="Confirm Password"
                            required
                        >

                    </div>

                    <button
                        type="submit"
                        class="btn"
                    >
                        Register
                    </button>

                </form>
                <!-- REGISTER FORM END -->

                <div class="social-buttons">

                    <button class="social-btn">
                        Google
                    </button>

                    <button class="social-btn">
                        GitHub
                    </button>

                </div>

            </div>

        </div>

    </div>

    <!-- CONNECT JAVASCRIPT -->
    <script src="./js/script.js"></script>

</body>
</html>
